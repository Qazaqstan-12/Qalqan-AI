        const searchInput = document.getElementById('lawSearch');
        const resultArea = document.getElementById('lawResult');
        const placeholder = document.getElementById('placeholder');
        const noResult = document.getElementById('noResult');
        const countBadge = document.getElementById('lawCount');

        countBadge.innerText = Object.keys(lawDatabase).length + " БАП ЖҮКТЕЛДІ";

        function displayLaw(law) {
            let badgeClass = "bg-sky-600";
            if(law.type === "Қылмыстық") badgeClass = "bg-red-600";
            if(law.type === "Әкімшілік") badgeClass = "bg-amber-500";

            return `
                <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100 mb-4 animate-slide-up">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="law-badge ${badgeClass} text-white">${law.type} Кодексі</span>
                    </div>
                    <h3 class="text-2xl font-black text-slate-800 mb-4 leading-tight">${law.title}</h3>
                    <div class="text-slate-600 leading-relaxed border-t pt-4">${law.content}</div>
                </div>
            `;
        }

        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            
            if (query === "") {
                placeholder.classList.remove('hidden');
                resultArea.classList.add('hidden');
                noResult.classList.add('hidden');
                return;
            }

            placeholder.classList.add('hidden');
            resultArea.innerHTML = "";
            let found = false;

            for (const key in lawDatabase) {
                const law = lawDatabase[key];
                const cleanKey = key.split('-')[0];
                
                if (cleanKey === query || law.title.toLowerCase().includes(query) || law.content.toLowerCase().includes(query) || law.type.toLowerCase().includes(query)) {
                    resultArea.innerHTML += displayLaw(law);
                    found = true;
                }
            }

            if (found) {
                resultArea.classList.remove('hidden');
                noResult.classList.add('hidden');
            } else {
                resultArea.classList.add('hidden');
                noResult.classList.remove('hidden');
            }
        }

        function quickAction(type) {
            searchInput.value = type;
            performSearch();
        }

        searchInput.addEventListener('input', performSearch);
    </script>
